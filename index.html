<!DOCTYPE html>

<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rubik's cube side project</title>
        <link rel="stylesheet" href="css.css">
        <link rel="icon" type="image/x-icon" href="./faviconCube.png">
        <script defer type="module" src="./JS/main.js">

        </script>
        <script defer src="https://cloud.umami.is/script.js" data-website-id="214725dd-9c87-4869-a04b-82d68e16fd81"></script>
        <style> 
                body { margin: 0;} 
        </style>
</head>
<body>

        <div id="info">
                <div><label for="sramleInput">Enter the scramble here: </label>
                        <input type="text" id="sramleInput" placeholder="U R U' R' " class="text"><br></div>
                <div><label for="">Enter the solution here: </label>
                        <input type="text" id="solutionInput" placeholder="R U R' U' " class="text"><br></div>

                <div id="underInput"> 
                        <button >Start</button> 

                        <label for="TPSInput">TPS (max 30): </label><input type="number" name="tps" id="TPSInput" value="10">
                
                        <label for="loop">Loop</label><input type="checkbox" id="loop">
                        
                        <label for="solveOnStart">Solve the cube at start</label><input type="checkbox" id="solveOnStart" checked>
                </div>
                <img src="./egg.png" alt="egg" style="display: none;">
        </div>
        
</body>
</html>

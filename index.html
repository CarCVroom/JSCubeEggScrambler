<!DOCTYPE html>

<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rubik's cube side project</title>
        <link rel="stylesheet" href="css.css">
        <link rel="icon" type="image/x-icon" href="./egg.png">
        <script defer type="module" src="./JS/main.js">

        </script>
        <style> 
                body { margin: 0;}
        </style>
</head>
<body>

        <div id="info">
                <div><label for="sramleInput">Enter the scramble here: </label>
                        <input type="text" id="sramleInput" placeholder="U R U' R' (You don't need to enter both to do turns)" class="text"><br></div>
                <div><label for="">Enter the solution here: </label>
                        <input type="text" id="solutionInput" placeholder="R U R' U' (You don't need to enter both to do turns)" class="text"><br></div>

                <div id="underInput"> 
                        <button >Start</button> 

                        <label for="TPSInput">TPS: </label><input type="number" name="tps" id="TPSInput">
                
                        <label for="loop">Loop</label><input type="checkbox" id="loop">
                </div>
        </div>
        
</body>
</html>
